<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PCE 针灸答题器</title>
  <meta name="theme-color" content="#1f1d18" />
  <style>
    /* 底部大按钮样式 */
    .bottom-back { width: 100%; padding: 16px; font-size: 16px; font-weight: 700; background: #e0dceb; color: #6040b0; border: none; border-radius: 12px; margin-top: 24px; cursor: pointer; }
    .bottom-back:hover { background: #d4c9f5; }
  </style>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="nav">
    <div class="brand"><div class="logo">P</div><span>PCE 针灸答题器</span></div>
    <button class="tab active" data-page="home">主页</button>
    <button class="tab" data-page="import">导入</button>
    <button class="tab" data-page="quiz">答题</button>
    <button class="tab" data-page="review">复习库</button>
    <button class="tab" data-page="mock">模拟考</button>
    <button class="tab" data-page="notes">📝笔记</button>
    <button class="tab" data-page="cloud">设置</button>
  </div>
</header>

<main>
  <!-- HOME -->
  <section id="home" class="page active">
    <div class="card">
      <div class="title">学习概况</div>
      <div class="grid">
        <div class="stat"><div class="k">题库总数</div><div class="v" id="st-total">0</div></div>
        <div class="stat"><div class="k">已作答题次</div><div class="v" id="st-done">0</div></div>
        <div class="stat"><div class="k">错题</div><div class="v redtext" id="st-wrong">0</div></div>
        <div class="stat"><div class="k">不会</div><div class="v orangetext" id="st-dk">0</div></div>
        <div class="stat"><div class="k">正确率</div><div class="v" id="st-rate">--</div></div>
      </div>
    </div>
    <div class="card">
      <div class="title">快速操作</div>
      <div class="row">
        <button class="btn primary" onclick="resumeQuiz()">▶ 继续答题 (上次停止处)</button>
        <button class="btn orange" onclick="showPage('review');renderReview()">复习错题/不会</button>
        <button class="btn blue" onclick="showPage('mock');renderMockSetup()">模拟考试</button>
      </div>
    </div>
    <div class="card">
      <div class="row">
        <div><div class="title">题目批次</div></div>
        <button class="btn primary spacer" onclick="showPage('import')">+ 导入新题</button>
      </div>
      <div id="batch-list"></div>
    </div>
  </section>

  <!-- IMPORT -->
  <section id="import" class="page">
    <div class="card">
      <div class="row"><button class="btn small" onclick="navBack()">← 返回</button><div class="title spacer" style="margin-left:10px">导入题目</div></div>
      <input id="batch-name" class="full" placeholder="批次名称，例如：PCE模拟卷A" />
      <label class="upload">
        <input id="file-input" type="file" accept=".txt" />
        <div class="upload-icon">📎</div>
        <div><b>点击上传 TXT</b></div>
      </label>
      <textarea id="raw" placeholder="把题目粘贴在这里..."></textarea>
      <div class="row mt">
        <button class="btn primary" onclick="importQuestions(true)">导入并开始</button>
        <button class="btn" onclick="importQuestions(false)">仅导入</button>
        <span class="spacer sub">每题限时</span>
        <input id="limit" type="number" min="0" max="600" value="60" class="tiny" /><span class="sub">秒</span>
      </div>
      <div id="import-msg" class="sub mt"></div>
    </div>
    <button class="bottom-back" onclick="navBack()">← 返回上一页</button>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="page">
    <div class="card">
      <div class="qtop">
        <div><div class="qcount">题 <strong id="q-num">--</strong> / <span id="q-total">--</span></div><div class="sub" id="q-batch"></div></div>
        <div class="timer spacer" id="timer" title="点击停止/重启，停止后不自动跳题">--</div>
      </div>
      <div class="progress"><div class="bar" id="qbar"></div></div>
      <div class="case" id="casebox"></div>
      <div class="qbody" id="qbody"></div>
      <div class="opts" id="opts"></div>
      <!-- 做题时的动态AI按钮插入处 -->
      <div id="quiz-ai-container"></div>
      <div class="row actions" id="quiz-actions" style="margin-top:15px">
        <button class="btn small" onclick="prevQ()">← 上一题</button>
        <button class="btn small" onclick="skipQ()">跳过</button>
        <button class="btn small orange" id="dkbtn" onclick="toggleDK()">不会</button>
        <button class="btn small primary" onclick="nextQ()">确认/下一题 →</button>
        <button class="btn small red spacer" onclick="finishQuiz()">结束</button>
      </div>
    </div>
    <button class="bottom-back" onclick="navBack()">← 返回上一页</button>
  </section>

  <!-- RESULT -->
  <section id="result" class="page">
    <div class="card">
      <div class="row"><button class="btn small" onclick="navBack()">← 返回</button><div class="title spacer" style="margin-left:10px">答题结果</div></div>
      <div class="grid">
        <div class="stat"><div class="k">答对</div><div class="v greentext" id="rs-ok">0</div></div>
        <div class="stat"><div class="k">答错</div><div class="v redtext" id="rs-bad">0</div></div>
        <div class="stat"><div class="k">不会</div><div class="v orangetext" id="rs-dk">0</div></div>
        <div class="stat"><div class="k">正确率</div><div class="v" id="rs-rate">--</div></div>
      </div>
    </div>
    <div class="card">
      <div class="title">核对与明细</div>
      <textarea id="answer-key" class="short" placeholder="粘贴正确答案，例如：43.A"></textarea>
      <div class="row mt">
        <button class="btn blue" onclick="compareKey()">按答案核对</button>
      </div>
      <div id="key-msg" class="sub mt"></div>
      <div class="tablewrap mt">
        <table>
          <thead><tr><th>题号</th><th>题目</th><th>我选</th><th>答案</th><th>结果</th><th>解析</th></tr></thead>
          <tbody id="result-table"></tbody>
        </table>
      </div>
    </div>
    <button class="bottom-back" onclick="navBack()">← 返回上一页</button>
  </section>

  <!-- REVIEW -->
  <section id="review" class="page">
    <div id="review-list"></div>
    <button class="bottom-back" onclick="navBack()">← 返回上一页</button>
  </section>

  <!-- MOCK -->
  <section id="mock" class="page">
    <div id="mock-area"></div>
    <button class="bottom-back" onclick="navBack()">← 返回上一页</button>
  </section>

  <!-- NOTES -->
  <section id="notes" class="page">
    <!-- rendered by renderNotes() -->
  </section>

  <!-- CLOUD -->
  <section id="cloud" class="page">
    <div class="card">
      <div class="row"><button class="btn small" onclick="navBack()">← 返回</button><div class="title spacer" style="margin-left:10px">云端与 API 设置</div></div>
      <div class="hint">
        <b>🤖 AI 解析功能 (Claude)：</b><br>
        填入一次自动永久保存。无需每次填。
      </div>
      <div class="row mt">
        <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." style="flex:1" />
        <button class="btn primary" onclick="saveApiKey()">保存 API Key</button>
      </div>
      <div id="api-key-status" class="sub mt"></div>
      <hr class="sep">
      <div class="hint"><b>云端同步设置 (Firebase)</b></div>
      <textarea id="firebase-config" class="short" placeholder='{"apiKey":"..."}'></textarea>
      <div class="row mt">
        <button class="btn primary" onclick="saveFirebaseConfig()">保存配置</button>
        <button class="btn" onclick="loadFirebaseConfigToBox()">读取已保存配置</button>
      </div>
      <div class="row mt">
        <input id="cloud-email" placeholder="Email" />
        <input id="cloud-pass" type="password" placeholder="Password" />
        <button class="btn blue" onclick="cloudRegister()">注册</button>
        <button class="btn primary" onclick="cloudLogin()">登录</button>
        <button class="btn" onclick="cloudLogout()">退出</button>
      </div>
      <div id="cloud-status" class="hint mt">未登录。</div>
      <div class="row mt">
        <button class="btn green" onclick="cloudUpload()">↑ 上传数据到云端</button>
        <button class="btn orange" onclick="cloudDownload()">↓ 从云端下载覆盖</button>
      </div>
    </div>
    <button class="bottom-back" onclick="navBack()">← 返回上一页</button>
  </section>
</main>

<!-- MODAL -->
<div id="modal-bg" class="modal-bg" onclick="if(event.target.id==='modal-bg')closeModal()">
  <div class="modal">
    <div class="row"><b id="m-title">题目</b><button class="btn small spacer" onclick="closeModal()">关闭</button></div>
    <div id="m-content" class="mt"></div>
  </div>
</div>
<div id="toast"></div>

<script src="app.js"></script>
<script>
  document.querySelector('.tab[data-page="notes"]').addEventListener('click', function(){ renderNotes(); });
  document.querySelector('.tab[data-page="review"]').addEventListener('click', function(){ renderReview(); });
  document.querySelector('.tab[data-page="mock"]').addEventListener('click', function(){ renderMockSetup(); });
</script>
</body>
</html>
